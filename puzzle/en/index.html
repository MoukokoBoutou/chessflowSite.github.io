<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07090d">
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="Open a ChessFlow puzzle in the Android app.">
  <link rel="canonical" href="https://chessflow.fr/puzzle/en/">
  <link rel="alternate" hreflang="fr" href="https://chessflow.fr/puzzle/">
  <link rel="alternate" hreflang="en" href="https://chessflow.fr/puzzle/en/">
  <link rel="alternate" hreflang="x-default" href="https://chessflow.fr/puzzle/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ChessFlow">
  <meta property="og:title" content="ChessFlow puzzle">
  <meta property="og:description" content="Open this puzzle in ChessFlow.">
  <meta property="og:image" content="https://chessflow.fr/assets/chessflow-og-en.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <title>ChessFlow puzzle</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon-192.png">
  <link rel="apple-touch-icon" href="/assets/favicon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/site.css">
  <script src="/assets/language-redirect.js" data-preserve-path-tail="true"></script>
</head>
<body class="puzzle-link-page">
  <main class="puzzle-open-main">
    <section class="puzzle-open-card" aria-live="polite">
      <img src="/assets/chessflow-icon.png" alt="" width="72" height="72">
      <div class="language-switcher" aria-label="Choose language">
        <a id="language-fr-link" href="/puzzle/" lang="fr" hreflang="fr">FR</a>
        <a id="language-en-link" href="/puzzle/en/" lang="en" hreflang="en" aria-current="page">EN</a>
      </div>
      <p class="eyebrow">ChessFlow puzzle</p>
      <h1>Opening puzzle...</h1>
      <p id="puzzle-open-message">If ChessFlow is installed, the app will open automatically.</p>
      <div class="puzzle-open-actions">
        <a class="button button-primary" id="open-app-link" href="https://play.google.com/store/apps/details?id=com.rolf.ChessFlow">Open ChessFlow</a>
        <a class="text-link" href="https://play.google.com/store/apps/details?id=com.rolf.ChessFlow">
          <span>Install the app</span><span aria-hidden="true">↗</span>
        </a>
      </div>
      <a class="legal-back" href="/en.html">← Back to site</a>
    </section>
  </main>

  <script>
    (function () {
      if (window.__chessflowLanguageRedirecting) {
        return;
      }

      var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.rolf.ChessFlow';
      var segments = window.location.pathname.split('/').filter(Boolean);
      var puzzleId = segments[0] === 'puzzle' && segments[1] === 'en' ? segments[2] : null;
      var message = document.getElementById('puzzle-open-message');
      var openLink = document.getElementById('open-app-link');
      var languageFrLink = document.getElementById('language-fr-link');
      var languageEnLink = document.getElementById('language-en-link');

      if (puzzleId && languageFrLink && languageEnLink) {
        languageFrLink.href = '/puzzle/' + encodeURIComponent(puzzleId);
        languageEnLink.href = '/puzzle/en/' + encodeURIComponent(puzzleId);
      }

      if (!puzzleId) {
        message.textContent = 'This puzzle link is incomplete.';
        openLink.textContent = 'Download ChessFlow';
        openLink.href = playStoreUrl;
        return;
      }

      var appUrl = 'chessopen://puzzle/' + encodeURIComponent(puzzleId);
      var pageHidden = false;
      openLink.href = appUrl;

      document.addEventListener('visibilitychange', function () {
        pageHidden = document.hidden;
      });

      window.setTimeout(function () {
        window.location.href = appUrl;
      }, 250);

      window.setTimeout(function () {
        if (pageHidden) {
          return;
        }
        message.textContent = 'If nothing opened, install ChessFlow or try again with the button.';
        if (/Android/i.test(window.navigator.userAgent)) {
          window.location.href = playStoreUrl;
        }
      }, 1800);
    })();
  </script>
</body>
</html>
